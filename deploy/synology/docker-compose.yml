# 党建益友 · 群晖 Container Manager 部署(项目方式导入本文件即可)
# 结构:db(PostgreSQL 16) + app(NestJS 后端,3001) + web(nginx 托管管理端/门户 SPA,5173)
# 访问:http://<NAS_IP>:5173(前端自动按 hostname 调 <NAS_IP>:3001/api,无需改前端配置)
services:
  db:
    image: postgres:16
    container_name: djyy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: djyy
      POSTGRES_PASSWORD: djyy_2026_pg # ★部署前务必改成强密码(与下方 DATABASE_URL 同步改)
      POSTGRES_DB: djyy
      TZ: Asia/Shanghai
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      # 首次初始化时自动建 casdoor 库(仅 pgdata 为空时执行;老库见 README「统一登录」节手动建库)
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djyy -d djyy"]
      interval: 5s
      timeout: 3s
      retries: 30
    # 需要在办公电脑用数据库工具直连时,取消下两行注释(端口 54320)
    # ports:
    #   - "54320:5432"

  app:
    build:
      context: .
      dockerfile: app.Dockerfile
    container_name: djyy-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://djyy:djyy_2026_pg@db:5432/djyy # ★密码与上面同步改
      PORT: "3001"
      NODE_ENV: production
      # ★必填:会话 JWT + OIDC state 的签名密钥。生成一个长随机串(如 openssl rand -base64 32)。
      #   生产漏填会导致后端拒绝启动(防止用源码公开默认密钥裸奔)。
      AUTH_SECRET: "CHANGE-ME-到一个长随机串-openssl-rand-base64-32"
      TZ: Asia/Shanghai # 定时任务(超期自动通过 每天 3:00)按北京时间跑
      STORAGE_DRIVER: local
      STORAGE_LOCAL_DIR: /data/storage
      EXHIBITION_DIST_DIR: /app/exhibition-dist
      # ★改成实际访问地址(NAS 的 IP;多个来源用英文逗号分隔)
      CORS_ORIGIN: http://10.185.28.220:5173
      # 首次启动且库为空时写入演示数据(admin 等账号);正式录入数据后建议删除本行
      SEED_ON_FIRST_RUN: "1"
      # ─── 统一登录(Casdoor)───
      # 首次部署保持 mock;按 README「七、统一登录」配好 Casdoor 应用后,
      # 把 AUTH_MODE 改 oidc、填入 client 凭据,重启 app 即切换
      AUTH_MODE: mock
      OIDC_ISSUER: http://10.185.28.220:8000 # ★NAS 的 IP:Casdoor 端口
      OIDC_CLIENT_ID: "" # ★Casdoor 应用页复制
      OIDC_CLIENT_SECRET: "" # ★Casdoor 应用页复制
      OIDC_REDIRECT_URI: http://10.185.28.220:3001/api/auth/oidc/callback # ★NAS 的 IP
      OIDC_JIT_CREATE: "0" # 1=IdP 有账号但平台没有时自动开通(无角色)
    volumes:
      # 业务文件区落在本项目文件夹 storage/ 下,File Station 里可直接浏览
      - ./storage:/data/storage
    ports:
      - "3001:3001"

  # 统一身份认证(Casdoor)。首次启动后按 README「七、统一登录」做一次性配置。
  casdoor:
    image: casbin/casdoor:latest
    container_name: djyy-casdoor
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUNNING_IN_DOCKER: "true"
      runmode: prod
      driverName: postgres
      # ★密码与上面 POSTGRES_PASSWORD 同步改;库名 casdoor 由 initdb 脚本自动创建
      dataSourceName: user=djyy password=djyy_2026_pg host=db port=5432 sslmode=disable dbname=casdoor
      dbName: casdoor
      # ★Casdoor 对外地址(浏览器访问的 URL,NAS 的 IP)
      origin: http://10.185.28.220:8000
    ports:
      - "8000:8000"

  web:
    image: nginx:alpine
    container_name: djyy-web
    restart: unless-stopped
    volumes:
      - ./web-dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"
