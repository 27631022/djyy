:root{--bg:#f4f3f0;--panel:#fff;--ink:#282420;--muted:#6f675e;--line:#e3ddd4;--accent:#37567f;--accent-soft:#e8eef5;--go:#2f7d4f;--go-soft:#e5f2ea;--warn:#a8641c;--warn-soft:#f7ecdd}

:root[data-theme="dark"]{--bg:#1b1917;--panel:#252220;--ink:#ebe6df;--muted:#9c948a;--line:#38332e;--accent:#8fb3dd;--accent-soft:#2b3644;--go:#66c493;--go-soft:#22352b;--warn:#d9a05b;--warn-soft:#3a2f21}

*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.7 "PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:44px 24px 90px;display:grid;gap:30px}

figcaption b{color:var(--ink);font-size:14px}

<header>
  <div class="eyebrow">党建益友 · 通用头像编辑器 · 基准头定稿(第三轮)</div>
  <h1>3D 卡通写实 · 定稿候选</h1>
  <div style="height:8px"></div>
  <p class="lede">按上轮反馈调整:<b>头占比提到约 70%、脖子自然粗细(不再刻意细)</b>。每个性别 3 个候选(AI 每次生成脸有自然差异),各选 1 张定为基准头。<b>眼神必须直视镜头</b>——基准头是全部部件的坐标系,眼神偏斜会传染到所有五官部件。</p>
</header>
